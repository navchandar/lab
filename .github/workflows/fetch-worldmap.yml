name: Fetch World Map Data

on:
  schedule:
    # Runs at 00:00 UTC on the 1st of Jan, Apr, Jul, and Oct (Quarterly)
    - cron: "0 0 1 1,4,7,10 *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "world-map-data-update"
  cancel-in-progress: false

jobs:
  fetch_map_data:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./world

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests

      - name: Run Script
        run: python map_data_parser.py

      - name: Git Pull Latest Changes
        run: git pull origin ${{ github.ref_name }}

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "build: updated world map data"
          # Ensure it picks up the JSON file inside the world folder
          file_pattern: "world/map_data.json"
