name: Fetch Company Data

on:
  schedule:
    # Runs at 06:00 PM UTC (03 AM IST) Mon-Fri
    - cron: "30 18 * * 0-4"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "company-data-update"
  cancel-in-progress: false

jobs:
  fetch_company_data:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./company

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Script
        run: python company_data_parser.py

      - name: Git Pull Latest Changes
        run: git pull origin ${{ github.ref_name }}

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "build: updated company data"
          # Ensure it picks up the JSON file inside the company folder
          file_pattern: "company/*.json company/*.csv"
