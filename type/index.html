      rel="stylesheet"
    />

    <style>
      :root {
        --bg-color: #ffffff;
        --text-color: #121212;
        --caret-color: #121212;
        --text-gradient: linear-gradient(
          to right,
          #ffadad,
          #ffd6a5,
          #fdffb6,
          #caffbf,
          #9bf6ff,
          #a0c4ff,
          #bdb2ff,
          #ffc6ff
        );
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg-color: #1a1a2e;
          --text-color: #e0e0e0;
          --caret-color: #ff99c8;
          --text-gradient: linear-gradient(
            to right,
            #ee79b0c2,
            #fcf6bde5,
            #d0f4ded3,
            #a9def9da,
            #e4c1f9db
          );
        }
      }

      body,
      html {
        display: flex;
        position: fixed; /* Prevents the whole page from being pushed up */
        justify-content: center;
        align-items: center;
        margin: 0;
        background-color: var(--bg-color);
        padding: 0;
        width: 100%;
        height: 100dvh; /* Use dvh to account for browser UI and keyboards */
        overflow: hidden;
      }

      main {
        display: flex;
        position: relative;
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        width: 100%;
        height: auto;
      }

      /* Font Stack: Lexend first, Comic Sans as reliable backup */
      #big-input {
        /* Prepare for animation */
        transform-origin: center;
        will-change: transform;
        margin-top: 6rem;
        outline: none;
        border: none;
        background: transparent;
        /* Define the Gradient */
        background-image: var(--text-gradient);
        /* Make the background fill the text */
        background-size: 400% 400%; /* Large size for smooth movement */
        width: 90vw;
        height: auto;
        max-height: 50%;
        color: var(--text-color);
        caret-color: var(--caret-color);
        font-weight: 700;
        font-size: clamp(15vh, 30vw, 30dvh);
        font-family:
          "Lexend", "Comic Sans MS", "Chalkboard SE", "Comic Neue", sans-serif;
        text-align: center;
        text-transform: uppercase;
        -webkit-background-clip: text;
        animation: gradient-move 8s ease infinite;
        background-clip: text;
        /* Make original text transparent so gradient shows through */
        -webkit-text-fill-color: transparent;
      }

      #big-input.hide-caret {
        margin-top: 2rem;
        margin-bottom: 6rem;
        caret-color: transparent;
        font-size: clamp(15vh, 40vw, 45dvh);
      }

      .typing-title {
        position: absolute;
        top: 10%;
        left: 50%;
        transform: translateX(-50%);
        opacity: 0.8;
        animation:
          typing 2s steps(4, end) forwards,
          blink-caret 0.75s step-end infinite;
        margin: 0 auto;
        border-right: 0.15em solid var(--caret-color);
        width: 0;
        /* Typing Animation Logic */
        overflow: hidden;
        color: var(--text-color);
        font-size: 2rem;
        font-family: "Lexend", sans-serif;
        letter-spacing: 5px;
        text-transform: uppercase;
        white-space: nowrap;
      }

      /* The typing effect */
      @keyframes typing {
        from {
          width: 0;
        }
        to {
          width: 5ch;
        } /* 'Type' is 4 chars + 1 for breathing room */
      }

      /* The typewriter cursor blinking */
      @keyframes blink-caret {
        from,
        to {
          border-color: transparent;
        }
        50% {
          border-color: var(--caret-color);
        }
      }

      /* The "jump" Animation */
      @keyframes popIn {
        0% {
          transform: scale(0.5);
          opacity: 0;
        }
        50% {
          transform: scale(1.2);
          opacity: 1;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      /* The Animation for the shifting colors */
      @keyframes gradient-move {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      /* toggle via JS to trigger animation */
      .animate-pop {
        animation:
          popIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275),
          gradient-move 8s ease infinite;
      }

      #big-input::selection {
        background: rgba(189, 178, 255, 0.3); /* Subtle purple tint */
        -webkit-text-fill-color: var(--text-color);
        /* Fallback to solid color on select */
      }

      /* Mobile style*/
      @media (max-width: 768px) {
        .typing-title {
          top: 5%;
          font-size: 1.5rem;
        }

        #big-input {
          margin-bottom: 0;
          font-size: 34dvh;
        }
      }
    </style>
  </head>
  <body>
    <main role="main">
      <h1 class="typing-title">Type</h1>
      <input
        type="text"
        id="big-input"
        autocomplete="off"
        spellcheck="false"
        inputmode="text"
        autofocus
      />
    </main>
    <script type="module" src="script.js"></script>
  </body>
</html>
