    <meta

    />

      rel="stylesheet"
    />

    <style>
      :root {
        --bg-color: #ffffff;
        --text-color: #121212;
        --caret-color: #121212;
        --text-gradient: linear-gradient(
          to right,
          #ffadad,
          #ffd6a5,
          #fdffb6,
          #caffbf,
          #9bf6ff,
          #a0c4ff,
          #bdb2ff,
          #ffc6ff
        );
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg-color: #1a1a2e;
          --text-color: #e0e0e0;
          --caret-color: #ff99c8;
          --text-gradient: linear-gradient(
            to right,
            #ee79b0c2,
            #fcf6bde5,
            #d0f4ded3,
            #a9def9da,
            #e4c1f9db
          );
        }
      }

      body,
      html {
        position: fixed;
        /* Prevents the whole page from being pushed up */
        margin: 0;
        background-color: var(--bg-color);
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      main {
        display: flex;
        position: relative;
        flex-direction: column;
        justify-content: center; /* Center vertically */
        align-items: center; /* Center horizontally */
        contain: strict; /* Optimization: Tells the browser this area is isolated */
        width: 100%;
        height: 100dvh;
        overflow: hidden;
      }

      /* Font Stack: Lexend first, Comic Sans as reliable backup */
      #big-input {
        display: flex;
        transform-origin: center;
        transition: none;
        will-change: transform, opacity;
        margin: 0;
        outline: none;
        border: none;
        background: transparent;
        /* Define the Gradient */
        background-image: var(--text-gradient);
        /* Make the background fill the text */
        background-size: 200% 200%;
        padding: 0;
        /* Large size for smooth movement */
        width: 90%;
        max-width: 100vw;
        height: 60%;
        overflow: visible;
        color: var(--text-color);
        caret-color: var(--caret-color);
        font-weight: 700;
        font-size: 30cqh;
        /* Use cqh (Container Query Height) to scale relative to the <main> box, not the browser window*/
        font-family: "Lexend", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        text-align: center;
        text-transform: uppercase;
        white-space: nowrap;
        -webkit-background-clip: text;
        filter: drop-shadow(2px 4px 10px rgba(0, 0, 0, 0.8));
        animation: gradient-move 16s ease infinite;
        box-sizing: border-box;
        background-clip: text;
        /* Make original text transparent so gradient shows through */
        -webkit-text-fill-color: transparent;
      }

      #big-input.hide-caret {
        caret-color: transparent;
        font-size: 50cqh;
      }

      .typing-title {
        position: absolute;
        top: 10%;
        left: 50%;
        transform: translateX(-50%);
        opacity: 0.8;
        animation:
          typing 2s steps(4, end) forwards,
          blink-caret 0.75s step-end infinite;
        margin: 0 auto;
        border-right: 0.15em solid var(--caret-color);
        width: 0;
        /* Typing Animation Logic */
        overflow: hidden;
        color: var(--text-color);
        font-size: 2rem;
        font-family: "Lexend", sans-serif;
        letter-spacing: 5px;
        text-transform: uppercase;
        white-space: nowrap;
      }

      /* The typing effect */
      @keyframes typing {
        from {
          width: 0;
        }

        to {
          width: 5ch;
        }

        /* 'Type' is 4 chars + 1 for breathing room */
      }

      /* The typewriter cursor blinking */
      @keyframes blink-caret {
        from,
        to {
          border-color: transparent;
        }

        50% {
          border-color: var(--caret-color);
        }
      }

      /* The "jump" Animation */
      @keyframes popIn {
        0% {
          transform: scale(0.8);
          opacity: 0;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      /* The Animation for the shifting colors */
      @keyframes gradient-move {
        0% {
          background-position: 0% 50%;
        }

        50% {
          background-position: 100% 50%;
        }

        100% {
          background-position: 0% 50%;
        }
      }

      /* toggle via JS to trigger animation */
      #big-input.animate-pop {
        backface-visibility: hidden;
        animation:
          popIn 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94),
          gradient-move 16s ease infinite;
        will-change: transform, opacity, background-position;
      }

      #big-input::selection {
        background: rgba(189, 178, 255, 0.3);
        /* Subtle purple tint */
        -webkit-text-fill-color: var(--text-color);
        /* Fallback to solid color on select */
      }

      /* Mobile style*/
      @media (max-width: 768px) {
        .typing-title {
          top: 15%;
          font-size: 1.5rem;
        }

        #big-input {
          filter: drop-shadow(1px 2px 5px rgba(0, 0, 0, 0.5));
          font-size: 20cqh;
        }

        #big-input.hide-caret {
          font-size: 34dvh;
        }
      }
    </style>

    <link rel="stylesheet" href="../static/settings.css" />
  </head>

  <body>
    <noscript>
      <div class="noscript-overlay">
        <div class="noscript-content">
          <h2>JavaScript is Required</h2>
          <p>We rely on JavaScript to render the interactive website.</p>
          <p>
            Please enable JavaScript in your browser settings and reload the
            page.
          </p>
          <a href="https://www.enable-javascript.com/" target="_blank"
            >How to enable JavaScript
          </a>
        </div>
      </div>
    </noscript>

    <main role="main">
      <h1 class="typing-title">Type</h1>
      <input
        type="text"
        id="big-input"
        autocomplete="off"
        spellcheck="false"
        inputmode="text"
        autofocus
      />
    </main>
    <script type="module" src="script.js"></script>
  </body>
