      /* --- Modern CSS Variables & Theming --- */
      :root {
        --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        --surface-color: rgba(255, 255, 255, 0.95);
        --text-main: #2d3748;

        --primary-hover: linear-gradient(135deg, #5a6fd6 0%, #663d91 100%);
        --error-gradient: linear-gradient(135deg, #fc8181 0%, #e53e3e 100%);

        /* Diff Colors */
        --diff-add-bg: #f0fff4;
        --diff-add-text: #276749;
        --diff-remove-bg: #fff5f5;
        --diff-remove-text: #9b2c2c;
        --radius: 12px;
        --transition: all 0.3s ease;
      }

      /* Dark Theme Override */
      @media (prefers-color-scheme: dark) {
        :root {
          --bg-gradient: linear-gradient(135deg, #1a202c 0%, #2d3748 100%);
          --surface-color: rgba(26, 32, 44, 0.95);
          --text-main: #f7fafc;
          --text-muted: #a0aec0;
          --border-color: rgba(74, 85, 104, 0.6);
          --primary-gradient: linear-gradient(135deg, #7f9cf5 0%, #9f7aea 100%);
          --primary-hover: linear-gradient(135deg, #667eea 0%, #805ad5 100%);

          --diff-add-bg: rgba(72, 187, 120, 0.15);
          --diff-add-text: #68d391;
          --diff-remove-bg: rgba(245, 101, 101, 0.15);
          --diff-remove-text: #fc8181;
        }
      }

      /* --- Global Styles --- */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
      }
      body {
        background: var(--bg-gradient);
        padding: 24px 16px;
        min-height: 100vh;
        color: var(--text-main);
      }

      .container {
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        margin: 0 auto;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        border-radius: var(--radius);
        background: var(--surface-color);
        padding: 32px;
        max-width: 1200px;
      }

      h1 {
        margin-bottom: 24px;
        background: var(--primary-gradient);
        font-weight: 800;
        font-size: 2rem;
        text-align: center;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      /* --- Mode Selector --- */
      .mode-selector {
        display: flex;
        justify-content: center;
        gap: 24px;
        margin-bottom: 24px;
      }
      .mode-label {
        display: flex;
        align-items: center;
        gap: 6px;
        transition: color 0.2s;
        cursor: pointer;
        color: var(--text-muted);
        font-weight: 500;
      }
      .mode-label:hover {
        color: var(--text-main);
      }
      .mode-label input {
        cursor: pointer;
        width: 16px;
        height: 16px;
        accent-color: #667eea;
      }

      /* --- Inputs --- */
      .input-group {
        display: none;
        flex-direction: column;
        gap: 16px;
        margin-bottom: 24px;
      }
      .input-group.active {
        display: flex;
      }
      @media (min-width: 768px) {
        .input-group {
          flex-direction: row;

      .compare-input {
        flex: 1;

        background: transparent;

        font-size: 1rem;

        background: rgba(255, 255, 255, 0.05);

      .side-pane:first-child {

      #loader {

    <script>
      // 1. Utils Module: Parsing, Diffing, Formatting
      const Utils = {
        isValidUrl(string) {
          try {
            new URL(string);
            return true;
          } catch (e) {
            return false;
          }
        },
        escapeHTML(str) {
          return str.replace(
            /[&<>'"]/g,
            (t) =>
              ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                "'": "&#39;",
                '"': "&quot;",
              })[t],
          );
        },

        // Smart content parser (used for URLs, Files, and Direct Text)
        processContent(text, identifier = "") {
          const trimmed = text.trim();
          const lowerId = identifier.toLowerCase();

          try {
            if (
              (trimmed.startsWith("{") && trimmed.endsWith("}")) ||
              (trimmed.startsWith("[") && trimmed.endsWith("]"))
            ) {
              return JSON.stringify(JSON.parse(trimmed), null, 2);
            }
          } catch (e) {}

          if (lowerId.endsWith(".js") && typeof js_beautify === "function")
            return js_beautify(text, { indent_size: 2 });
          if (lowerId.endsWith(".css") && typeof css_beautify === "function")
            return css_beautify(text, { indent_size: 2 });

          const lowerText = trimmed.toLowerCase();
          if (
            lowerText.startsWith("<!doctype html>") ||
            lowerText.includes("<html") ||
            lowerText.includes("<body")
          ) {
            const doc = new DOMParser().parseFromString(text, "text/html");
            doc
              .querySelectorAll(
                "script, style, noscript, iframe, svg, meta, link",
              )
              .forEach((el) => el.remove());
            return (doc.body.innerText || doc.body.textContent || "")
              .replace(/\n\s*\n/g, "\n")
              .trim();
          }

          if (!text.includes("\n") && text.length > 500)
            return text.replace(/([{};,])/g, "$1\n");
          return text.replace(/\r\n/g, "\n");
        },

        enhanceWithWordDiffs(lines) {
          let i = 0;
          let globalLinkId = 0;

          while (i < lines.length) {
            if (lines[i].type === "removed") {
              let rmStart = i;
              while (i < lines.length && lines[i].type === "removed") i++;
              let rmEnd = i - 1;

              let addStart = i;
              while (i < lines.length && lines[i].type === "added") i++;
              let addEnd = i - 1;

              if (addStart <= addEnd) {
                const rmText = lines
                  .slice(rmStart, rmEnd + 1)
                  .map((l) => l.text)
                  .join("\n");
                const addText = lines
                  .slice(addStart, addEnd + 1)
                  .map((l) => l.text)
                  .join("\n");

                const wordDiff = Diff.diffWordsWithSpace(rmText, addText);

                let unchangedChars = 0;
                wordDiff.forEach((part) => {
                  if (!part.added && !part.removed)
                    unchangedChars += part.value.length;
                });

                const maxLength = Math.max(rmText.length, addText.length);
                const similarity =
                  maxLength === 0 ? 0 : unchangedChars / maxLength;

                // Skip the 40% threshold if the block is short (< 50 chars)
                if (similarity >= 0.4 || maxLength < 50) {
                  let rmHtmlLines = [],
                    currentRmLine = "";
                  let addHtmlLines = [],
                    currentAddLine = "";
                  let isEditing = false;

                  wordDiff.forEach((part) => {
                    const splitLines = part.value.split("\n");

                    // Group sequential additions/removals under one ID
                    if (!part.added && !part.removed) {
                      isEditing = false;
                    } else if (!isEditing) {
                      globalLinkId++;
                      isEditing = true;
                    }

                    splitLines.forEach((str, idx) => {
                      const escaped = this.escapeHTML(str);
                      if (!part.added) {
                        currentRmLine += part.removed
                          ? `<span class="word-removed word-linked" data-link="${globalLinkId}">${escaped}</span>`
                          : escaped;
                        if (idx < splitLines.length - 1) {
                          rmHtmlLines.push(currentRmLine);
                          currentRmLine = "";
                        }
                      }
                      if (!part.removed) {
                        currentAddLine += part.added
                          ? `<span class="word-added word-linked" data-link="${globalLinkId}">${escaped}</span>`
                          : escaped;
                        if (idx < splitLines.length - 1) {
                          addHtmlLines.push(currentAddLine);
                          currentAddLine = "";
                        }
                      }
                    });
                  });
                  rmHtmlLines.push(currentRmLine);
                  addHtmlLines.push(currentAddLine);

                  for (let j = 0; j <= rmEnd - rmStart; j++) {
                    if (lines[rmStart + j])
                      lines[rmStart + j].html = rmHtmlLines[j];
                  }
                  for (let j = 0; j <= addEnd - addStart; j++) {
                    if (lines[addStart + j])
                      lines[addStart + j].html = addHtmlLines[j];
                  }
                }
              }
            } else {
              i++;
            }
          }
          return lines;
        },

        //  Flattens the jsdiff output and runs the heavy word diffs ONCE
        flattenAndEnhanceDiff(diffArray) {
          let lines = [];
          let oldLine = 1;
          let newLine = 1;

          diffArray.forEach((part) => {
            const partLines = part.value.replace(/\n$/, "").split("\n");
            partLines.forEach((text) => {
              if (part.added) {
                lines.push({
                  type: "added",
                  oldLine: "",
                  newLine: newLine++,
                  text,
                });
              } else if (part.removed) {
                lines.push({
                  type: "removed",
                  oldLine: oldLine++,
                  newLine: "",
                  text,
                });
              } else {
                lines.push({
                  type: "unchanged",
                  oldLine: oldLine++,
                  newLine: newLine++,
                  text,
                });
              }
            });
          });

          return this.enhanceWithWordDiffs(lines);
        },

        // Fast filter for the UI to toggle context lines
        filterContext(lines, contextSize = 2, contextOnly = true) {
          // Return everything instantly
          if (!contextOnly) {
            return lines;
          }

          let keepIndices = new Set();
          for (let i = 0; i < lines.length; i++) {
            if (lines[i].type !== "unchanged") {
              for (
                let j = Math.max(0, i - contextSize);
                j <= Math.min(lines.length - 1, i + contextSize);
                j++
              ) {
                keepIndices.add(j);
              }
            }
          }

          let finalLines = [];
          let lastIndex = -1;
          Array.from(keepIndices)
            .sort((a, b) => a - b)
            .forEach((idx) => {
              if (lastIndex !== -1 && idx > lastIndex + 1) {
                finalLines.push({ type: "separator" });
              }
              finalLines.push(lines[idx]);
              lastIndex = idx;
            });

          return finalLines;
        },

        readFileAsText(file) {
          return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => resolve(e.target.result);
            reader.onerror = () =>
              reject(new Error(`Failed to read ${file.name}`));
            reader.readAsText(file);
          });
        },
      };

      // UI Module: DOM interactions & Animations
      const UI = {
        els: {
          btn: document.getElementById("compare-btn"),
          loader: document.getElementById("loader"),
          output: document.getElementById("diff-output"),
          controls: document.getElementById("diff-controls"),
          viewBtns: document.querySelectorAll(".view-btn"),
          modeRadios: document.querySelectorAll('input[name="input-mode"]'),
          inputGroups: document.querySelectorAll(".input-group"),
          contextCb: document.getElementById("context-only-cb"),
          toastContainer: document.getElementById("toast-container"),
        },

        showToast(msg, isError = false) {
          const toast = document.createElement("div");
          toast.className = `toast ${isError ? "error" : ""}`;
          toast.textContent = msg;
          this.els.toastContainer.appendChild(toast);
          requestAnimationFrame(() =>
            requestAnimationFrame(() => toast.classList.add("show")),
          );
          setTimeout(() => {
            toast.classList.remove("show");
            setTimeout(() => toast.remove(), 300);
          }, 4000);
        },

        setLoading(isLoading) {
          this.els.btn.disabled = isLoading;
          this.els.btn.textContent = isLoading ? "Analyzing..." : "Compare";
          this.els.loader.style.display = isLoading ? "block" : "none";
          if (isLoading) {
            this.els.output.innerHTML = "";
            this.els.controls.style.display = "none";
          }
        },

        renderInlineDiff(processedLines, contextOnly) {
          const contextLines = Utils.filterContext(
            processedLines,
            2,
            contextOnly,
          );

          if (contextLines.length === 0)
            return (this.els.output.innerHTML =
              '<div class="diff-row"><div class="line-text" style="padding:16px;">No differences found!</div></div>');

          let html = "";
          contextLines.forEach((line) => {
            if (line.type === "separator")
              return (html += `<div class="diff-separator">@@ ... @@</div>`);
            const color =
              line.type === "added"
                ? "diff-added"
                : line.type === "removed"
                  ? "diff-removed"
                  : "";
            const prefix =
              line.type === "added"
                ? "+"
                : line.type === "removed"
                  ? "-"
                  : "&nbsp;";
            html += `<div class="diff-row ${color}">
                       <div class="line-num">${line.oldLine}</div>
                       <div class="line-num">${line.newLine}</div>
                       <div class="line-text"><span class="diff-prefix">${prefix}</span>${line.html || Utils.escapeHTML(line.text)}</div>
                     </div>`;
          });
          this.els.output.innerHTML = html;
        },

        renderSplitDiff(processedLines, contextOnly) {
          const contextLines = Utils.filterContext(
            processedLines,
            2,
            contextOnly,
          );

          if (contextLines.length === 0) {
            return (this.els.output.innerHTML =
              '<div class="diff-row"><div class="line-text" style="padding:16px;">No differences found!</div></div>');
          }

          // Change to a column-direction container holding individual rows
          let html =
            '<div style="display: flex; flex-direction: column; width: 100%;">';

          for (let i = 0; i < contextLines.length; i++) {
            const line = contextLines[i];

            if (line.type === "separator") {
              html += `<div class="split-row"><div class="diff-separator">@@ ... @@</div></div>`;
            } else if (line.type === "unchanged") {
              html += `<div class="split-row">
                         <div class="half-row"><div class="line-num">${line.oldLine}</div>
                          <div class="line-text"><span class="diff-prefix">&nbsp;</span>${line.html || Utils.escapeHTML(line.text)}</div></div>
                         <div class="half-row"><div class="line-num">${line.newLine}</div>
                          <div class="line-text"><span class="diff-prefix">&nbsp;</span>${line.html || Utils.escapeHTML(line.text)}</div></div>
                       </div>`;
            } else {
              // It is either a "removed" or "added" line.
              // We look ahead to group consecutive removals and additions so we can pair them up horizontally.
              let rmLines = [];
              let addLines = [];

              // Collect consecutive removed lines
              while (
                i < contextLines.length &&
                contextLines[i].type === "removed"
              ) {
                rmLines.push(contextLines[i]);
                i++;
              }
              // Collect consecutive added lines immediately following
              while (
                i < contextLines.length &&
                contextLines[i].type === "added"
              ) {
                addLines.push(contextLines[i]);
                i++;
              }

              // Step back one index because the outer 'for' loop will increment it automatically
              i--;

              // Render them side-by-side, padding the shorter side with empty rows
              const maxLen = Math.max(rmLines.length, addLines.length);

              // Build row by row to guarantee height alignment
              for (let j = 0; j < maxLen; j++) {
                html += `<div class="split-row">`;

                // Left Pane (Removals)
                if (rmLines[j]) {
                  html += `<div class="half-row diff-removed"><div class="line-num">${rmLines[j].oldLine}</div>
                  <div class="line-text"><span class="diff-prefix">-</span>${rmLines[j].html || Utils.escapeHTML(rmLines[j].text)}</div></div>`;
                } else {
                  html += `<div class="half-row"><div class="line-num"></div><div class="line-text"></div></div>`;
                }

                // Right Pane (Additions)
                if (addLines[j]) {
                  html += `<div class="half-row diff-added"><div class="line-num">${addLines[j].newLine}</div>
                  <div class="line-text"><span class="diff-prefix">+</span>${addLines[j].html || Utils.escapeHTML(addLines[j].text)}</div></div>`;
                } else {
                  html += `<div class="half-row"><div class="line-num"></div><div class="line-text"></div></div>`;
                }

                html += `</div>`;
              }
            }
          }

          html += "</div>";
          this.els.output.innerHTML = html;
        },
      };

      // App Controller
      const App = {
        currentDiff: null,
        processedLines: null,
        currentView: "inline",
        inputMode: "url",

        init() {
          this.loadPreferences();
          this.bindEvents();
          document.getElementById("year").textContent =
            new Date().getFullYear();

          window.addEventListener("offline", () =>
            UI.showToast("Offline mode.", true),
          );
          window.addEventListener("online", () => UI.showToast("Back online."));
        },

        loadPreferences() {
          // Load Context Checkbox state
          const savedContext = localStorage.getItem("diffContextOnly");
          if (savedContext !== null) {
            UI.els.contextCb.checked = savedContext === "true";
          } else {
            UI.els.contextCb.checked = true; // Default state
          }

          // Load Input Mode state
          const savedMode = localStorage.getItem("diffInputMode");
          if (savedMode) {
            this.inputMode = savedMode;

            // Check the correct radio button
            UI.els.modeRadios.forEach((radio) => {
              radio.checked = radio.value === savedMode;
            });

            // Display the correct input group
            UI.els.inputGroups.forEach((g) => g.classList.remove("active"));
            document
              .getElementById(`group-${savedMode}`)
              .classList.add("active");
          }

          // --- Load View Mode state ---
          const savedView = localStorage.getItem("diffViewMode");
          if (savedView) {
            this.currentView = savedView;
            UI.els.viewBtns.forEach((b) => b.classList.remove("active"));
            const targetBtn = document.querySelector(
              `[data-view="${savedView}"]`,
            );
            if (targetBtn) {
              targetBtn.classList.add("active");
            }
          }
        },

        bindEvents() {
          UI.els.btn.addEventListener("click", () => this.executeComparison());
          UI.els.viewBtns.forEach((btn) =>
            btn.addEventListener("click", (e) =>
              this.switchView(e.target.dataset.view),
            ),
          );

          UI.els.modeRadios.forEach((radio) => {
            radio.addEventListener("change", (e) => {
              this.inputMode = e.target.value;
              localStorage.setItem("diffInputMode", this.inputMode);
              UI.els.inputGroups.forEach((g) => g.classList.remove("active"));
              document
                .getElementById(`group-${this.inputMode}`)
                .classList.add("active");
            });
          });

          // Save preference on change and re-render if a diff exists
          UI.els.contextCb.addEventListener("change", (e) => {
            localStorage.setItem("diffContextOnly", e.target.checked);
            if (this.processedLines) {
              this.renderCurrentView();
            }
          });

          //  Hover synchronization for word diffs
          const diffOutput = UI.els.output;
          diffOutput.addEventListener("mouseover", (e) => {
            const target = e.target.closest(".word-linked");
            if (!target) {
              return;
            }
            const linkId = target.getAttribute("data-link");
            document
              .querySelectorAll(`[data-link="${linkId}"]`)
              .forEach((el) => el.classList.add("word-hover"));
          });

          diffOutput.addEventListener("mouseout", (e) => {
            const target = e.target.closest(".word-linked");
            if (!target) {
              return;
            }
            const linkId = target.getAttribute("data-link");
            document
              .querySelectorAll(`[data-link="${linkId}"]`)
              .forEach((el) => el.classList.remove("word-hover"));
          });
        },

        async getInputs() {
          if (this.inputMode === "url") {
            const u1 = document.getElementById("url1").value.trim();
            const u2 = document.getElementById("url2").value.trim();
            if (!u1 || !u2) throw new Error("Provide both URLs.");
            if (!Utils.isValidUrl(u1) || !Utils.isValidUrl(u2))
              throw new Error("Invalid URLs.");

            const fetchProxy = async (url) => {
              const res = await fetch(
                `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
              );
              if (!res.ok) throw new Error(`HTTP ${res.status} from ${url}`);
              return Utils.processContent(await res.text(), url);
            };
            return await Promise.all([fetchProxy(u1), fetchProxy(u2)]);
          }

          if (this.inputMode === "text") {
            const t1 = document.getElementById("text1").value;
            const t2 = document.getElementById("text2").value;
            if (!t1 && !t2) throw new Error("Provide text to compare.");
            return [Utils.processContent(t1), Utils.processContent(t2)];
          }

          if (this.inputMode === "file") {
            const f1 = document.getElementById("file1").files[0];
            const f2 = document.getElementById("file2").files[0];
            if (!f1 || !f2) throw new Error("Select two files.");

            // --- Size & Type Validation ---
            const MAX_SIZE = 20 * 1024 * 1024; // 20MB Limit
            if (f1.size > MAX_SIZE || f2.size > MAX_SIZE) {
              throw new Error(
                "File too large. Maximum allowed size is 20MB per file.",
              );
            }

            // Reject obvious binary formats
            const isBinary = (type) =>
              /image|video|audio|pdf|zip|octet-stream/.test(type);
            if (isBinary(f1.type) || isBinary(f2.type)) {
              throw new Error(
                "Invalid file type. Please upload text, code, or data files.",
              );
            }

            const [txt1, txt2] = await Promise.all([
              Utils.readFileAsText(f1),
              Utils.readFileAsText(f2),
            ]);
            return [
              Utils.processContent(txt1, f1.name),
              Utils.processContent(txt2, f2.name),
            ];
          }
        },

        // --- Inline Web Worker to process Diff in background ---
        runDiffInWorker(text1, text2) {
          return new Promise((resolve, reject) => {
            // Helper to stringify our existing Utils methods so the worker can use them
            const fnToStr = (obj, name) => {
              let str = obj[name].toString();
              return str.startsWith(name) ? "function " + str : str;
            };

            const workerCode = `
              importScripts('https://cdn.jsdelivr.net/npm/diff@8.0.4/dist/diff.min.js');

              // Inject our Utils methods into the worker scope
              ${fnToStr(Utils, "escapeHTML")}
              ${fnToStr(Utils, "enhanceWithWordDiffs").replace(/this\.escapeHTML/g, "escapeHTML")}
              ${fnToStr(Utils, "flattenAndEnhanceDiff").replace(/this\.enhanceWithWordDiffs/g, "enhanceWithWordDiffs")}

              self.onmessage = function(e) {
                try {
                  const diffArray = Diff.diffLines(e.data.text1, e.data.text2);
                  const processedLines = flattenAndEnhanceDiff(diffArray);
                  postMessage({ success: true, processedLines });
                } catch(err) {
                  postMessage({ success: false, error: err.message });
                }
              };
            `;

            const blob = new Blob([workerCode], {
              type: "application/javascript",
            });
            const worker = new Worker(URL.createObjectURL(blob));

            worker.onmessage = (e) => {
              if (e.data.success) {
                resolve(e.data.processedLines);
              } else {
                reject(new Error(e.data.error));
              }
              worker.terminate();
            };

            worker.onerror = () => {
              reject(new Error("Error occurred in the background web worker!"));
              worker.terminate();
            };

            worker.postMessage({ text1, text2 });
          });
        },

        async executeComparison() {
          if (this.inputMode === "url" && !navigator.onLine) {
            return UI.showToast("You are offline.", true);
          }

          UI.setLoading(true);
          try {
            const [text1, text2] = await this.getInputs();

            // UI Update: Let user know the background worker is running
            UI.els.loader.innerHTML =
              '<div class="spinner"></div><span style="color: var(--text-muted); font-weight: 500">Diffing...</span>';

            // --- Await the Web Worker ---
            this.processedLines = await this.runDiffInWorker(text1, text2);

            UI.els.controls.style.display = "flex";
            this.renderCurrentView();
          } catch (error) {
            UI.showToast(error.message, true);
          } finally {
            // Reset loader text for the next run
            UI.els.loader.innerHTML =
              '<div class="spinner"></div><span style="color: var(--text-muted); font-weight: 500">Fetching and analyzing content...</span>';
            UI.setLoading(false);
          }
        },

        switchView(viewMode) {
          if (this.currentView === viewMode) {
            return;
          }
          this.currentView = viewMode;
          // --- Save view preference to local storage ---
          localStorage.setItem("diffViewMode", this.currentView);

          UI.els.viewBtns.forEach((b) => b.classList.remove("active"));
          document
            .querySelector(`[data-view="${viewMode}"]`)
            .classList.add("active");
          this.renderCurrentView();
        },

        renderCurrentView() {
          if (!this.processedLines) {
            return;
          }
          const contextOnly = UI.els.contextCb.checked;
          if (this.currentView === "inline") {
            UI.renderInlineDiff(this.processedLines, contextOnly);
          } else {
            UI.renderSplitDiff(this.processedLines, contextOnly);
          }
        },
      };

      // Initialize App on load
      document.addEventListener("DOMContentLoaded", () => App.init());
    </script>
  </body>
</html>
