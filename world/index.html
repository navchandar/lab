    <style>
      /* Color Palette & Variables */
      :root {
        --bg-color: #62d2ff;
        --bg-darker: #005983;
        --text-color: #333333;
        --country-fill: #42920c;
        --country-stroke: #ffffff;
        --country-hover: #ffd700;
        --country-active: #ff6347;
        --country-active2: #a6412f;
        --panel-bg: rgba(255, 255, 255, 0.8);
        --map-shadow: drop-shadow(1px 4px 1px rgba(0, 0, 0, 0.5));
        --box-shadow: 0 15px 25px rgba(0, 0, 0, 0.3);
      }

      /* Dark Mode Support */
      @media (prefers-color-scheme: dark) {
        :root {
          --bg-color: #042445;
          --bg-darker: #011721;
          --text-color: #ffffff;
          --country-fill: #09b988;
          --country-stroke: #000000;
          --country-hover: #ffdc00;
          --country-active: #ff851b;
          --country-active2: #bd5f0d;
          --panel-bg: rgba(0, 0, 0, 0.8);
          --map-shadow: drop-shadow(1px 4px 1px rgba(0, 0, 0, 1));
          --box-shadow: 0 15px 25px rgba(0, 0, 0, 0.5);
        }

        .extra-info {
          color: #f1f1f1 !important;
        }
      }

      body {
        /* Prevents accidental scrolling on mobile */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        transition: background-color 0.5s ease;
        margin: 0;
        background: radial-gradient(
          circle,
          var(--bg-color) 0%,
          var(--bg-darker) 100%
        );
        background-color: var(--bg-color);
        padding: 0;
        height: 100vh;
        overflow: hidden;
        color: var(--text-color);
        /* Dyslexia-friendly and Kid-friendly fonts */
        font-family:
          "Lexend", "Comic Sans MS", "Chalkboard SE", "Marker Felt", sans-serif;
      }

      main {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        width: 100vw;
        max-width: 100vw;
        min-height: 100vh;
      }

      /* The Name Popup Display */
      #name-display {
        display: flex;
        position: absolute;
        top: 10%;
        flex-direction: column;
        /* Stack vertically if extra info is shown */
        align-items: center;
        gap: 15px;
        transform: scale(0);
        opacity: 0;
        z-index: 10;
        backdrop-filter: blur(5px);
        transition:
          opacity 0.5s ease,
          transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        margin: 0;
        background-color: var(--panel-bg);
        padding: 15px 40px;
        pointer-events: none;
        font-weight: 700;
        font-size: 2.5rem;
        text-align: center;
        -webkit-backdrop-filter: blur(12px);
        box-shadow: var(--box-shadow);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 20px;
      }

      #name-display.show {
        transform: scale(1);
        opacity: 1;
        transition:
          transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1),
          opacity 0.3s ease;
      }

      .country-header {
        display: flex;
        align-items: center;
        gap: 15px;
      }

      /* New styles for the extra info text */
      .extra-info {
        color: #555;
        font-weight: 400;
        font-size: 1.2rem;
      }

      /* --- Loading Screen Styles --- */
      #loading-screen {
        display: flex;
        position: absolute;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 100;
        transition:
          opacity 0.5s ease,
          visibility 0.5s ease;
        inset: 0;
        background-color: var(--bg-color);
      }

      .globe-loader {
        display: flex;
        position: relative;
        justify-content: center;
        align-items: center;
        width: 100px;
        height: 100px;
      }

      /* The central Earth with a gentle pulse */
      .earth-circle {
        z-index: 2;
        animation: earth-pulse 3s ease-in-out infinite;
        font-size: 5rem;
        text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
      }

      /* The invisible ring that handles the rotation */
      .orbit {
        position: absolute;
        z-index: 3;
        /* Pure mathematical rotation - no frames! */
        animation: smooth-rotate 3s linear infinite;
        border-radius: 50%;
        /* Slightly larger than the Earth */
        width: 130px;
        height: 130px;
      }

      /* The little icon traveling around the world */
      .traveler {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%) rotate(45deg);
        font-size: 1.5rem;
      }

      /* --- Animations --- */
      @keyframes smooth-rotate {
        from {
          transform: rotate(0deg);
        }

        to {
          transform: rotate(360deg);
        }
      }

      @keyframes earth-pulse {
        0%,
        100% {
          transform: scale(1);
          filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
        }

        50% {
          transform: scale(1.05);
          filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.5));
        }
      }

      .loading-text {
        animation: text-pulse 3s ease-in-out infinite;
        margin-top: 30px;
        color: var(--text-color);
        font-weight: 700;
        font-size: 1.5rem;
        letter-spacing: 1px;
      }

      @keyframes text-pulse {
        0%,
        100% {
          transform: translateY(0);
          opacity: 1;
        }

        50% {
          transform: translateY(5px);
          opacity: 0.6;
        }
      }

      #flag-img {
        /* Hidden until a country is clicked */
        display: none;
        border: 1px solid;
        border-radius: 5px;
        height: 40px;
      }

      #map-container {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100%;
      }

      svg {
        filter: var(--map-shadow);
        width: 100%;
        height: 100%;
        touch-action: none;
      }

      /* Country Map Styles */
      .country {
        vector-effect: non-scaling-stroke;
        transition:
          transform 1s ease-in,
          fill 0.3s ease,
          stroke 0.3s ease,
          opacity 1s ease-in-out;
        will-change: fill;
        cursor: pointer;
        fill: var(--country-fill);
        stroke: var(--country-stroke);
        stroke-width: 0.2px;
      }

      /* Hover and Focus (Accessibility) Effects */
      .country.hovering {
        fill: url(#hoverGradient) !important;
      }

      .country.active {
        transform: translateY(-0.5px);
        fill: url(#activeGradient) !important;
        stroke: #000000;
        stroke-width: 0.5px;
      }

      /* Mobile adjustments */
      @media (max-width: 768px) {
        :root {
          --map-shadow: drop-shadow(1px 2px 3px rgba(0, 0, 0, 0.8));
        }

        #name-display {
          top: 10%;
          padding: 10px 20px;
          font-size: 2rem;
        }

        .extra-info {
          font-size: 1rem;
        }
      }
    </style>

          viewBox="0 0 24 24"
          width="24"
          xmlns="http://www.w3.org/2000/svg"
        ></svg>
      </button>

      <!-- Settings Button -->
      <button id="settings-btn" aria-label="Settings" title="Settings Menu">
        <img
          id="settings-icon"
          src="../static/icons/settings.svg"
          width="24"
          height="24"
          alt="Settings"
          aria-hidden="true"
        />
      </button>

      <!-- Overlay Menu -->
      <div
        id="settings-menu"
        role="dialog"
        aria-modal="true"
        aria-labelledby="settings-label"
      >
        <span id="settings-label" class="sr-only" style="display: none"
          >Settings Menu
        </span>
        <div class="autoplay-checkbox">
          <label for="autoplay" id="autoplay-label">Auto-Play:</label>
          <input type="checkbox" id="autoplay" />
        </div>

        <div
          class="info-checkbox"
          style="
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
          "
        >
          <label for="show-extra-info" id="extra-info-label"
            >Show Extra Info:</label
          >
          <input type="checkbox" id="show-extra-info" />
        </div>
      </div>
    </main>

    <script type="module" src="script.js"></script>
  </body>
</html>
