<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says Game</title>
    <style>
        :root {
            --bg-color: #fff0f6;
            --card-bg: #ffffff;
            --primary: #ff2d78; /* Pink */
            --secondary: #9c27b0; /* Purple */
            --accent: #008080; /* Teal */
            --text: #333;
            --btn-text: #ffffff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1a1a2e;
                --card-bg: #16213e;
                --primary: #ff4d94;
                --secondary: #bd59d4;
                --accent: #26a69a;
                --text: #f0f0f0;
            }
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            text-align: center;
            max-width: 500px;
            width: 100%;
            border: 6px solid var(--accent);
        }

        h1 { color: var(--primary); font-size: 2.5rem; margin-top: 0; }

        #display-box {
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            line-height: 1.4;
            margin: 1.5rem 0;
            padding: 1.5rem;
            border-radius: 20px;
            background: rgba(156, 39, 176, 0.05);
            color: var(--text);
            border: 3px dashed var(--secondary);
            transition: all 0.2s ease;
        }

        .generate-btn {
            background-color: var(--primary);
            color: var(--btn-text);
            border: none;
            padding: 1.5rem;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 8px 0 #b31b53;
            transition: transform 0.1s;
        }

        .generate-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #b31b53;
        }

        .generate-btn:focus { outline: 4px solid var(--accent); outline-offset: 4px; }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            #display-box { font-size: 1.4rem; min-height: 120px; }
        }
    </style>
</head>
<body>

<main class="container">
    <h1>Simon Says!</h1>
    <div id="display-box" aria-live="assertive">Ready to play?</div>
    <button class="generate-btn" onclick="generateTask()">GENERATE COMMAND</button>
</main>

<script>
    const simpleTasks = [
        "Jump 3 times!", "Touch your nose!", "Clap your hands!", "Spin once!", "Wave your hands!", 
        "Touch your toes!", "Wiggle your fingers!", "Nod your head!", "Point to the ceiling!", "Stick out your tongue!",
        "Stomp your feet!", "Give a thumbs up!", "Pat your tummy!", "Cover your eyes!", "Blink 5 times!",
        "Moo like a cow!", "Hop on one foot!", "Touch your ears!", "Meow like a cat!", "Pretend to wash your hands!",
        "Shrug your shoulders!", "Sit down!", "Stand up!", "Touch your knees!", "Blow a kiss!",
        "March in place!", "Wiggle your nose!", "Point to something blue!", "Make a circle in the air!", "Cross your arms!",
        "Touch your elbows!", "Pretend to eat!", "Yawn loudly!", "Smile big!", "Shake your head 'No'!",
        "Nod your head 'Yes'!", "Tap your chin!", "Look at the floor!", "Reach for the stars!", "Flap your arms like a bird!",
        "Give yourself a hug!", "Snap your fingers!", "Whistle (or try to)!", "Touch your eyebrows!", "Wink one eye!",
        "Pretend to sleep!", "Check your watch!", "Point to your shoes!", "Count to 3!", "Hold up 5 fingers!"
    ];

    const hardTasks = [
        "Spell your name backwards!", "Stand on one leg for 10 seconds!", "Touch your left ear with your right hand!", 
        "Name 5 animals in 10 seconds!", "Say the days of the week!", "Count by twos to twenty!", "Rub your tummy and pat your head!", 
        "Do 5 jumping jacks!", "Name 3 fruits that are red!", "Recite a nursery rhyme!", "Balance a book on your head!",
        "Draw a square in the air with your foot!", "Say 'Blueberry Pie' 5 times fast!", "Crawl like a crab!", "Walk backwards 5 steps!",
        "Name 4 things you see that are round!", "Count backwards from 10!", "Sing 'Happy Birthday'!", "Do a slow-motion run!",
        "Find something smaller than your hand!", "Describe your shirt without looking!", "Name 3 neighbors or friends!",
        "Close your eyes and touch your nose!", "Spell the word 'APPLE'!", "List 3 colors in the rainbow!",
        "Stand as still as a statue for 15 seconds!", "Hop like a frog 4 times!", "Tell a short joke!", "Name 5 body parts!",
        "Pretend to tie your shoes!", "Bark like a dog then sit!", "Identify 3 sounds you hear right now!", "Say 'Hello' in a deep voice!",
        "Point to your left, then your right!", "Try to touch your nose with your toe!", "Name 3 things you do in the morning!",
        "Whisper your favorite color!", "Hum your favorite song!", "Describe the weather outside!", "Say the alphabet until 'M'!",
        "Count how many windows are in the room!", "Pretend to be a robot!", "Walk on your tiptoes!", "Spin 3 times without falling!",
        "Name 2 things that are very hot!", "Touch your back with both hands!", "Make a sound like a car!", "Find something soft!",
        "Name 3 things that live in water!", "Clap a rhythm and repeat it!"
    ];

    function generateTask() {
        const isHard = Math.random() < 0.25;
        const taskPool = isHard ? hardTasks : simpleTasks;
        const action = taskPool[Math.floor(Math.random() * taskPool.length)];
        
        const twistRoll = Math.random();
        const display = document.getElementById('display-box');
        
        if (twistRoll < 0.15) {
            display.innerText = `Sam says: ${action}`;
            display.style.color = "var(--primary)";
        } else if (twistRoll < 0.25) {
            display.innerText = action;
            display.style.color = "var(--primary)";
        } else {
            display.innerText = `Simon says: ${action}`;
            display.style.color = "var(--accent)";
        }
    }
</script>

</body>
</html>
