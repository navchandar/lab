<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Simon Says | Game for Kids</title>
    <link
      rel="icon"
      href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👑</text></svg>"
    />

    <link rel="canonical" href="https://navchandar.github.io/lab/simon-says/" />

    <meta
      name="description"
      content="A bright, colorful Simon Says game for children aged 3-10. Simple interactive tasks to keep kids active and laughing!"
    />
    <meta
      name="keywords"
      content="Simon Says, kids game, interactive game, physical activity for kids, game for children"
    />

    <meta name="robots" content="index, follow" />
    <meta name="author" content="Naveenchandar" />
    <meta property="og:author" content="Naveenchandar" />

    <meta name="title" property="og:title" content="Simon Says" />
    <meta
      name="description"
      property="og:description"
      content="A bright, colorful Simon Says game for children aged 3-10. Simple interactive tasks to keep kids active and laughing!"
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://navchandar.github.io/lab/simon-says/"
    />
    <meta
      name="image"
      property="og:image"
      content="https://navchandar.github.io/lab/simon-says/preview.png"
    />

    <style>
      :root {
        /* Warm, playful palette */
        --gp-pink: #f472b6;
        --gp-purple: #818cf8;
        --gp-teal: #34d399;
        --bg-gradient: linear-gradient(
          135deg,
          #fdf2f8 0%,
          #ede9fe 50%,
          #ecfdf5 100%
        );
        --card-bg: rgba(255, 255, 255, 0.85);
        --text-main: #1e1b4b;
        --text-correct: #fff;
        --text-warn: #fb7185;
        --display-bg: rgba(99, 102, 241, 0.08);
        --btn-shadow: rgba(244, 114, 182, 0.35);
        --btn-hover-shadow: rgba(52, 211, 153, 0.4);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --gp-pink: #db2777;
          --gp-purple: #6366f1;
          --gp-teal: #10b981;
          --bg-gradient: radial-gradient(circle at top left, #1e1b4b, #0f0f1a);
          --card-bg: rgba(30, 27, 75, 0.55);
          --text-main: #e0e7ff;
          --text-correct: #0f0f1a;
          --text-warn: #fb7185;
          --display-bg: rgba(99, 102, 241, 0.15);
          --btn-shadow: rgba(219, 39, 119, 0.3);
          --btn-hover-shadow: rgba(16, 185, 129, 0.35);
        }
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
        background: var(--bg-gradient);
        padding: max(20px, env(safe-area-inset-top))
          max(20px, env(safe-area-inset-right))
          max(20px, env(safe-area-inset-bottom))
          max(20px, env(safe-area-inset-left));
        min-height: 90vh;
        color: var(--text-main);
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      .game-card {
        position: relative;
        z-index: 0;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
        border: 8px solid transparent;
        border-radius: 40px;
        background: var(--card-bg);
        background-clip: padding-box;
        padding: 2.5rem;
        width: 100%;
        max-width: 450px;
        text-align: center;
      }

      /* Gradient Border */
      .game-card::before {
        position: absolute;
        top: -8px;
        right: -8px;
        bottom: -8px;
        left: -8px;
        z-index: -1;
        box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
        border-radius: 48px;
        background: linear-gradient(
          135deg,
          var(--gp-pink),
          var(--gp-purple),
          var(--gp-teal)
        );
        content: "";
      }

      h1 {
        margin: 0 0 1rem 0;
        font-size: 2.8rem;
      }

      #display-area {
        display: flex;
        justify-content: center;
        align-items: center;
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        margin-bottom: 2rem;
        box-shadow: inset 0 2px 10px rgba(99, 102, 241, 0.5);
        border: 1px solid rgba(129, 140, 248, 0.12);
        border-radius: 25px;
        background: var(--display-bg);
        padding: 1.5rem;
        min-height: 160px;
        color: var(--text-main);
        font-weight: 700;
        font-size: 1.6rem;
        line-height: 1.4;
        hyphens: auto;
        word-break: keep-all;
      }

      .btn-generate {
        transition: all 0.3s ease;
        cursor: pointer;
        box-shadow: 0 10px 25px var(--btn-shadow);
        border: none;
        border-radius: 20px;
        background: linear-gradient(135deg, var(--gp-pink), var(--gp-purple));
        padding: 1.2rem;
        width: 100%;
        color: #fff;
        font-weight: 800;
        font-size: 1.4rem;
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      .btn-generate.on-cooldown {
        transform: scale(0.97);
        opacity: 0.6;
        pointer-events: none;
      }

      .btn-generate:hover {
        transform: translateY(-3px) scale(1.02);
        box-shadow: 0 15px 30px var(--btn-hover-shadow);
        background: linear-gradient(135deg, var(--gp-purple), var(--gp-teal));
        color: #fff;
      }

      .btn-generate:active {
        transform: translateY(2px) scale(0.98);
        box-shadow: 0 5px 10px rgba(0, 0, 0, 0.15);
      }

      .pop-anim {
        animation: pop 0.4s ease-out;
      }
      @keyframes pop {
        0% {
          transform: scale(0.9);
          opacity: 0;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      /* Styles for mobile devices */
      @media (max-width: 767px) {
        .game-card {
          border-radius: 30px;
          padding: 1.5rem;
        }
        h1 {
          font-size: 2rem;
        }
        #display-area {
          font-size: 1.3rem;
        }
      }

      @media (hover: none) {
        .btn-generate:active {
          transform: scale(0.95);
          box-shadow: 0 5px 15px var(--btn-shadow);
          background: linear-gradient(135deg, var(--gp-teal), var(--gp-purple));
        }
      }
    </style>
    <link rel="stylesheet" href="../static/settings.css" />
  </head>
  <body>
    <noscript>
      <div class="noscript-overlay">
        <div class="noscript-content">
          <h2>JavaScript is Required</h2>
          <p>We rely on JavaScript to render the interactive website.</p>
          <p>
            Please enable JavaScript in your browser settings and reload the
            page.
          </p>
          <a href="https://www.enable-javascript.com/" target="_blank"
            >How to enable JavaScript
          </a>
        </div>
      </div>
    </noscript>

    <main class="game-card" role="main">
      <h1>Simon Says!</h1>

      <div id="display-area" aria-live="polite">
        Tap the button to get your first command!
      </div>

      <button
        class="btn-generate"
        id="btn-generate"
        onclick="playGame()"
        aria-label="Generate a new Simon Says command"
      >
        Next Move!
      </button>
    </main>

    <button
      id="fullscreen-btn"
      aria-label="Toggle fullscreen mode"
      title="Toggle fullscreen"
    >
      <svg
        id="fullscreen-icon"
        fill="none"
        height="24"
        viewBox="0 0 24 24"
        width="24"
        xmlns="http://www.w3.org/2000/svg"
      ></svg>
    </button>

    <script type="module" src="script.js"></script>
  </body>
</html>
