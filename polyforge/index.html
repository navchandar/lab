<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>PolyForge | CSS Clip-Path Generator</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔰</text></svg>"
    />

    <meta
      name="description"
      content="Convert complex shapes into CSS clip-path polygons with a custom number of points. Useful for smooth UI animations and transitions."
    />
    <meta
      name="keywords"
      content="CSS, Clip-path, Polygon Generator, Web Development, UI Design, SVG to Polygon, Animation Tools"
    />

    <meta name="robots" content="index, follow" />
    <meta name="author" content="Naveenchandar" />

    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://navchandar.github.io/lab/polyforge/"
    />
    <meta property="og:title" content="PolyForge | CSS Clip-Path Generator" />
    <meta
      property="og:description"
      content="A fast, client-side tool to convert complex shapes into CSS clip-path polygons with a custom number of points. Useful for smooth UI animations and transitions."
    />
    <meta
      property="og:image"
      content="https://navchandar.github.io/lab/polyforge/preview.png"
    />

    <meta
      property="twitter:title"
      content="PolyForge | CSS Clip-Path Generator"
    />
    <meta
      property="twitter:description"
      content="A fast, client-side tool to convert complex shapes into CSS clip-path polygons with a custom number of points. Useful for smooth UI animations and transitions."
    />
    <meta
      property="twitter:image"
      content="https://navchandar.github.io/lab/polyforge/preview.png"
    />

    <style>
      :root {
        /* Default Light Mode Palette */
        --bg: #ffffff;
        --card: #f4f4f5;
        --text: #09090b;
        --accent: #7c3aed;
        --accent-hover: #6d28d9;
        --border: #e4e4e7;
        --input-bg: #ffffff;
        --code-bg: #454545;
        --success: #10b981;
        --canvas-bg: #fdfdfd;
      }

      /* Automatic Dark Mode Support */
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #09090b;
          --card: #18181b;
          --text: #fafafa;
          --accent: #bd7cff;
          --accent-hover: #a03ff0;
          --border: #27272a;
          --input-bg: #09090b;
          --code-bg: #000;
          --success: #066646;
          --canvas-bg: #0c0c0e;
        }
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        transition:
          background-color 0.3s ease,
          color 0.3s ease;
        background-color: var(--bg);
        padding: 1rem;
        min-height: 100vh;
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      .app-shell {
        display: flex;
        flex-direction: column;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--card);
        padding: 2rem;
        width: 100%;
        max-width: 650px;
        max-height: 95vh;
        overflow-y: auto;
      }

      header {
        margin-bottom: 1.5rem;
        text-align: center;
      }

      header h1 {
        background: linear-gradient(135deg, var(--accent), #dd41f5);
        font-size: 1.6rem;
        letter-spacing: -0.05rem;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
      }

      header p {
        margin-top: 4px;
        color: #71717a;
        font-size: 0.85rem;
      }

      .grid-layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }

      .control-block {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
      }

      label {
        color: #a1a1aa;
        font-weight: 600;
        font-size: 0.75rem;
        text-transform: uppercase;
      }

      select,
      input {
        transition: border-color 0.2s;
        outline: none;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--input-bg);
        padding: 0.6rem;
        color: var(--text);
        font-size: 1rem;
      }

      select:focus,
      input:focus {
        box-shadow: 0 0 0 2px rgba(189, 124, 255, 0.2);
        border-color: var(--accent);
      }

      .shape-preview {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 1.5rem;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: repeating-conic-gradient(
            rgba(0, 0, 0, 0.1) 0% 25%,
            transparent 0% 50%
          )
          50% / 20px 20px;
        background-color: var(--canvas-bg);
        aspect-ratio: 16/9;
        width: 100%;
        min-height: 200px;
        overflow: hidden;
      }

      #canvas-shape {
        transform: translateZ(0);
        backface-visibility: hidden;
        transition: clip-path 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        will-change: clip-path;
        background: radial-gradient(circle at 0% 0%, var(--accent), #8b5cf6);
        /* background: linear-gradient(135deg, var(--accent), #8b5cf6); */
        width: 180px;
        height: 180px;
        /* Smoother edges during animation */
        -webkit-font-smoothing: antialiased;
        display: none;
      }

      .code-container {
        position: relative;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--code-bg);
        padding: 1rem;
        height: 130px;
        overflow: hidden;
      }

      code {
        display: block;
        padding-right: 35px;
        height: 100%;
        overflow-y: auto;
        color: #d1d5db;
        font-size: 0.8rem;
        font-family: "Fira Code", monospace;
        white-space: pre-wrap;
        word-break: break-all;
      }

      .copy-trigger {
        position: absolute;
        top: 0.5rem;
        right: 0.5rem;
        z-index: 10;
        transition: all 0.2s;
        cursor: pointer;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--code-bg);
        padding: 6px;
        color: #fff;
      }

      .copy-trigger:hover {
        border-color: var(--accent);
        background: var(--accent);
      }

      /* Scrollbar styling */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-thumb {
        border-radius: 10px;
        background: var(--border);
      }

      /* Tab Navigation */
      .tabs {
        display: flex;
        gap: 1.5rem;
        margin-bottom: 1.5rem;
        border-bottom: 1px solid var(--border);
        padding-bottom: 0;
      }

      .tab {
        position: relative;
        transition: color 0.2s;
        cursor: pointer;
        border: none;
        background: none;
        padding: 0.5rem 0;
        color: #a1a1aa;
        font-weight: 600;
        font-size: 0.9rem;
      }

      .tab:hover {
        color: var(--text);
      }

      .tab.active {
        color: var(--accent);
      }

      .tab.active::after {
        position: absolute;
        bottom: -1px;
        left: 0;
        border-radius: 2px 2px 0 0;
        background: var(--accent);
        width: 100%;
        height: 2px;
        content: "";
      }

      /* Custom SVG Input */
      textarea {
        transition: border-color 0.2s;
        outline: none;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--input-bg);
        padding: 0.5rem;
        width: 100%;
        min-height: 80px;
        resize: vertical;
        color: var(--text);
        font-size: 0.75rem;
        font-family: "Fira Code", monospace;
      }

      textarea:focus {
        box-shadow: 0 0 0 2px rgba(189, 124, 255, 0.2);
        border-color: var(--accent);
      }

      .warning-text {
        display: none; /* Toggled via JS */
        margin-top: 0.4rem;
        color: #ef4444; /* Vibrant Red */
        font-weight: 600;
        font-size: 0.75rem;
      }

      /* Utility Classes */
      .hidden {
        display: none !important;
      }

      .full-width {
        grid-column: 1 / -1;
      }

      /* Mobile-Specific Refinements */
      @media (max-width: 600px) {
        .app-shell {
          border: none;
          border-radius: 0; /* Full screen look on mobile */
          padding: 1.25rem;
          max-height: 100vh;
        }

        .grid-layout {
          grid-template-columns: 1fr;
          gap: 1.25rem;
        }

        header h1 {
          font-size: 1.4rem;
        }

        #canvas-shape {
          width: 140px;
          height: 140px;
        }

        code {
          font-size: 0.75rem;
        }
      }

      /* Support for very small devices (iPhone SE, etc.) */
      @media (max-width: 380px) {
        body {
          padding: 0;
        }

        .shape-preview {
          aspect-ratio: 4/3;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <header>
        <h1>PolyForge</h1>
        <p>Dynamic Polygon Sampling Engine</p>
      </header>

      <div class="tabs" role="tablist">
        <button class="tab active" id="tab-preset" role="tab">
          Preset Shapes
        </button>
        <button class="tab" id="tab-custom" role="tab">Custom SVG</button>
      </div>

      <div class="grid-layout">
        <div class="control-block" id="preset-block">
          <label for="shape-select">Shape</label>
          <select
            id="shape-select"
            aria-label="Select a base shape geometry"
          ></select>
        </div>

        <div class="control-block hidden full-width" id="custom-block">
          <label for="custom-svg">SVG or Path</label>
          <textarea
            id="custom-svg"
            placeholder="<svg>...</svg> or M 50 0 L 100 100..."
            aria-label="Paste SVG code"
          ></textarea>
          <span id="svg-warning" class="warning-text"
            >⚠️ Invalid SVG or Path data! Could not parse!</span
          >
        </div>

        <div class="control-block">
          <label for="point-count">Points</label>
          <input
            type="number"
            id="point-count"
            step="1"
            aria-label="Enter number of polygon points"
          />
        </div>
      </div>

      <div class="shape-preview" style="position: relative">
        <button
          class="copy-trigger"
          id="copy-svg-btn"
          title="Copy as SVG"
          aria-label="Copy shape as SVG code"
        >
          📋
        </button>
        <div
          id="canvas-shape"
          role="img"
          aria-label="Polygon preview shape"
        ></div>
      </div>

      <div class="control-block">
        <label>CSS clip-path</label>
        <div class="code-container">
          <code id="output-code" aria-live="polite"></code>
          <button
            class="copy-trigger"
            id="copy-btn"
            title="Copy CSS clip-path"
            aria-label="Copy CSS clip-path value"
          >
            📋
          </button>
        </div>
      </div>
    </main>

    <svg style="visibility: hidden; position: absolute" width="0" height="0">
      <path id="engine" d=""></path>
    </svg>

    <script type="module" src="script.js"></script>
  </body>
</html>
