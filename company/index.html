    <!-- DataTables FixedHeader CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/fixedheader/3.3.1/css/fixedHeader.dataTables.min.css"
    />

    <style>
      :root {
        --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        --bg-color: #0f172a;
        --title-gradient: linear-gradient(to right, #30daec, #db28c8);
        --table-head-gradient: linear-gradient(0deg, #1e2638 0%, #0e1525 100%);
        --table-head-gradient-hover: linear-gradient(
          0deg,
          #0e1525 0%,
          #000205 100%
        );
        --glass-bg: rgba(255, 255, 255, 0.05);
        --glass-border: rgba(255, 255, 255, 0.1);
        --accent-color: #38bdf8;
        --text-main: #f1f5f9;
        --text-muted: #94a3b8;
        --card-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        /* Adding variable for consistent borders in table cells */
        --row-border: rgba(255, 255, 255, 0.05);
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
          --bg-color: #f8fafc;
          --title-gradient: linear-gradient(to right, #3b82f6, #9333ea);
          --table-head-gradient: linear-gradient(
            180deg,
            #f8fafc 0%,
            #e2e8f0 100%
          );
          --table-head-gradient-hover: linear-gradient(
            0deg,
            #e2e8f0 0%,
            #becfe6 100%
          );
          --glass-bg: rgba(255, 255, 255, 0.7);
          --glass-border: rgba(0, 0, 0, 0.1);
          /* Darker border for light mode */
          --accent-color: #2563eb;
          --text-main: #1e293b;
          --text-muted: #475569;
          --card-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
          --row-border: rgba(0, 0, 0, 0.05);
        }
      }

      * {
        transition:
          background 0.3s ease,
          color 0.3s ease,
          border 0.3s ease;
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        margin: 0;
        background-color: var(--bg-color);
        padding: 0;
        width: 100%;
        min-width: fit-content;
        overscroll-behavior-x: none;
      }

      body {
        display: flex;
        flex-direction: column;
        background: var(--bg-gradient);
        background-attachment: fixed;
        padding: 20px;
        min-height: 100vh;
        color: var(--text-main);
        font-family: "Inter", sans-serif;
      }

      header {
        margin-bottom: 20px;
        text-align: center;
      }

      h1 {
        background: var(--title-gradient);
        font-weight: 600;
        font-size: 2.5rem;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -1px;
      }

      #loadingSpinner {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 10;
        animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        box-sizing: content-box;
        border: 4px solid #f3f3f3;
        border-top: 4px solid #3498db;
        border-radius: 50%;
        width: 40px;
        height: 40px;
      }

      .spinner-hidden {
        display: none;
      }

      @keyframes spin {
        0% {
          transform: translate(-50%, -50%) rotate(0deg);
        }

        100% {
          transform: translate(-50%, -50%) rotate(360deg);
        }
      }

      .container {
        flex-grow: 1;
        margin: 0 auto;
        width: 100%;
        max-width: 1200px;
      }

      .table-card {
        backdrop-filter: blur(12px);
        background: var(--glass-bg);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: var(--card-shadow);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        padding: 24px;
        overflow: visible !important;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        background-color: var(--glass-bg);
      }

      .fixedHeader-floating {
        z-index: 1001 !important;
      }

      #companyTable {
        width: 100% !important;
        table-layout: fixed;
      }

      table.dataTable {
        border: none !important;
        border-collapse: collapse !important;
        width: 100% !important;
        color: var(--text-main) !important;
      }

      table.dataTable thead th {
        border-bottom: 1px solid var(--glass-border) !important;
        background: var(--table-head-gradient) !important;
        padding: 15px !important;
        color: var(--accent-color);
        font-weight: 600;
        font-size: 0.75rem;
        letter-spacing: 0.05em;
        text-align: left;
        text-transform: uppercase;
      }
      table.dataTable thead th:hover {
        background: var(--table-head-gradient-hover) !important;
      }

      /* Specific widths for each column */
      /* Company Name */
      #companyTable th:nth-child(1) {
        width: 40% !important;
      } /* Employees */
      #companyTable th:nth-child(2) {
        width: 10% !important;
      } /* Website */
      #companyTable th:nth-child(3) {
        width: 20% !important;
      } /* LinkedIn */
      #companyTable th:nth-child(4) {
        width: 10% !important;
      } /* Status/ Type */
      #companyTable th:nth-child(5) {
        width: 10% !important;
      } /* Updated Date */
      #companyTable th:nth-child(6) {
        width: 15% !important;
      }

      table.dataTable tbody td {
        border-bottom: 1px solid var(--row-border) !important;
        padding: 15px !important;
        font-size: 0.9rem;
      }

      table.dataTable tbody td:nth-child(1) {
        max-width: 400px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      table.dataTable tbody td:nth-child(4),
      table.dataTable tbody td:nth-child(5) {
        padding: 5px !important;
      }

      table.dataTable tbody tr {
        background: transparent !important;
      }

      table.dataTable tbody tr:hover {
        transform: scale(1.002);
        background: rgba(150, 150, 150, 0.08) !important;
      }

      .paginate_button.current {
        border: 1.5px solid rgba(0, 0, 0, 0.8) !important;
        font-weight: 900 !important;
      }

      a {
        transition: opacity 0.2s;
        color: var(--accent-color);
        text-decoration: none;
      }

      a:hover {
        opacity: 0.8;
        text-decoration: underline;
      }

      .dataTables_filter input {
        margin-bottom: 10px;
        outline: none;
        border: 1px solid var(--glass-border) !important;
        border-radius: 8px !important;
        background: var(--glass-bg) !important;
        padding: 8px 12px !important;
        width: 400px;
        color: var(--text-main) !important;
      }

      select {
        border: 1px solid var(--glass-border) !important;
        border-radius: 6px !important;
        background: var(--glass-bg) !important;
        padding: 2px 5px;
        color: var(--text-main) !important;
      }

      .dataTables_info,
      .dataTables_paginate {
        margin-top: 20px !important;
        color: var(--text-muted) !important;
      }

      .dataTables_paginate .paginate_button:hover {
        color: gray !important;
      }

      .paginate_button {
        border: 1px solid var(--glass-border) !important;
        border-radius: 8px !important;
        background: var(--glass-bg) !important;
        color: var(--text-main) !important;
      }
      .public-icon {
        display: inline-flex;
        justify-content: center;
        align-items: center;
        transition: all 0.2s ease;
        border-radius: 10px;
        width: 40px;
        height: 40px;
        font-size: 1.4em;
      }

      /* Specific styling for the ticker link */
      .icon-link {
        position: relative;
        cursor: pointer;
        border-bottom: 1px solid rgba(56, 189, 248, 0.75);
        text-decoration: none !important;
      }

      .icon-link:hover {
        transform: translateY(-2px) scale(1.1);
        box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
        border-bottom: 1px solid rgba(56, 189, 248, 0.9);
      }

      .emp-filter-wrapper {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      label {
        color: var(--text-muted);
        font-weight: 600;
        font-size: 0.8rem;
        text-transform: uppercase;
      }

      #empFilter {
        cursor: pointer;
        border: 1px solid var(--glass-border) !important;
        border-radius: 8px;
        background: var(--glass-bg) !important;
        padding: 8px 12px;
        min-width: 160px;
        color: var(--text-main) !important;
      }

      select:hover {
        background: rgba(150, 150, 150, 0.1) !important;
      }

      .text-center {
        text-align: center !important;
      }

      td svg {
        vertical-align: middle;
      }

      .top-wrapper {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        align-items: center;
        gap: 15px;
        margin-bottom: 10px;
      }

      footer {
        padding: 10px 5px 0px 5px;
        color: var(--text-muted);
        line-height: 1.8;
        text-align: center;
      }

      .error {
        background: #ffebee;
        padding: 20px;
        color: #d32f2f;
        text-align: center;
      }

      /* Mobile view style*/
      @media (max-width: 768px) {
        h1 {
          display: none;
          font-size: 1.8rem;
        }
