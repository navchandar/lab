    <style>
      /* Theme Variables & Auto-Detection */
      :root {
        --bg-body: #fdfcf0;
        --bg-gradient: linear-gradient(135deg, #fdfcf0 0%, #f7ebcb 100%);
        --card-bg: rgba(255, 255, 255, 0.75);
        --card-border: 1px solid rgba(180, 83, 9, 0.5);
        --text-primary: #332b21;
        --text-secondary: #71604a;
        --accent-color: #b45309;
        --accent-glow: 0 10px 25px rgba(180, 83, 9, 0.25);
        --badge-bg: rgba(21, 128, 61, 0.1);
        --badge-text: #15803d;
        --font-main: "Inter", system-ui, -apple-system, sans-serif;
        --check-color: #15803d;
        --checked-bg: rgba(21, 128, 61, 0.06);
      }

      /* Global Smooth Transitions */
      * {
        transition:
          background-color 0.5s ease,
          border-color 0.5s ease,
          color 0.5s ease,
          box-shadow 0.5s ease;
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        display: flex;
        flex-direction: column;
        background: var(--bg-body);
        background-image: var(--bg-gradient);
        height: 100vh;
        overflow: hidden;
        color: var(--text-primary);
        font-family: var(--font-main);
        /* Prevent body scroll, handle in container */
      }

      /* Header Styling */
      header {
        flex-shrink: 0;
        z-index: 10;
        padding: 30px 20px 0;
        text-align: center;
      }

      h1 {
        background: linear-gradient(to bottom, #ea9335, #b45309);
        font-size: 2rem;
        -webkit-background-clip: text;
        margin-bottom: 5px;
        -webkit-text-fill-color: transparent;
        color: var(--text-primary);
        font-weight: 800;
        font-size: 2.2rem;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }

      .subtitle {
        color: var(--text-secondary);
        font-weight: 400;
        font-size: 1.1rem;
      }

      /* Carousel (Scroll Container) */
      .carousel-container {
        display: flex;
        align-items: center;
        gap: 20px;
        padding: 20px 8vw; /* Side padding for centering first/last item */
        height: 100%;
        overflow-x: auto;
        overflow-y: hidden;
        scroll-snap-type: x mandatory;
        scrollbar-width: none;
      }

      .carousel-container::-webkit-scrollbar {
        display: none;
      }

      /* Card Styling */
      .day-card {
        flex: 0 0 auto;
        backdrop-filter: blur(12px);
        background: var(--card-bg);
        width: 85vw;
        max-width: 380px;
        height: 68vh;
        min-height: 400px;
        -webkit-backdrop-filter: blur(12px);
        display: flex;
        position: relative;
        flex-direction: column;
        transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        cursor: pointer;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        border: var(--card-border);
        border-radius: 28px;
        padding: 28px;
        scroll-snap-align: center;
      }

      /* Active Card State */
      .day-card.active {
        transform: scale(1.02);
        backdrop-filter: blur(2px);
        box-shadow: var(--accent-glow);
        border-width: 2px;
        border-color: var(--accent-color);
        -webkit-backdrop-filter: blur(2px);
        z-index: 2;
      }

      .day-card.active .day-name {
        color: var(--accent-color);
        text-shadow: 0 0.5px 0 black;
      }

      .day-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
        border-bottom: 1px solid rgba(128, 128, 128, 0.1);
        padding-bottom: 10px;
      }

      .day-name {
        color: var(--text-primary);
        font-weight: 900;
        font-size: 1.8rem;
      }

      .category-badge {
        border-radius: 100px;
        background: var(--badge-bg);
        padding: 5px 10px;
        color: var(--badge-text);
        font-weight: 700;
        font-size: 0.8rem;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }

      .day-card.active .category-badge {
        border-width: 1px;
        border-style: solid;
        border-color: #075021;
      }

      /* List & Item Styling */
      .card-body {
        flex-grow: 1;
        padding-right: 10px;
        overflow-y: auto;
      }

      li {
        border-bottom: 1px solid rgba(128, 128, 128, 0.08);
        padding: 10px 0;
        list-style: none;
      }

      .item-row {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        cursor: pointer;
      }

      /* Custom Checkbox */
      .snack-checkbox {
        appearance: none;
        -webkit-appearance: none;
        position: relative;
        flex-shrink: 0;
        transition: all 0.2s ease;
        cursor: pointer;
        margin-top: 5px;
        border: 2px solid var(--text-secondary);
        border-radius: 4px;
        background: transparent;
        width: 20px;
        height: 20px;
      }

      .snack-checkbox:hover {
        box-shadow: 0 0 0 2px rgba(21, 128, 61, 0.2);
        border-color: var(--check-color);
      }

      .snack-checkbox:checked {
        border-color: var(--check-color);
        background: var(--check-color);
      }

      .snack-checkbox:checked:hover {
        transform: scale(0.9);
      }

      .snack-checkbox:checked::after {
        position: absolute;
        top: 1px;
        left: 5px;
        transform: rotate(45deg);
        border: solid white;
        border-width: 0 2px 2px 0;
        width: 5px;
        height: 10px;
        content: "";
      }

      .item-content {
        flex: 1;
        min-width: 0;
      }

      .item-name {
        display: flex;
        align-items: center;
        transition: opacity 0.3s ease;
        margin-bottom: 4px;
        color: var(--text-primary);
        font-weight: 700;
        font-size: 1.05rem;
      }

      .item-desc {
        transition: opacity 0.3s ease;
        padding-left: 0;
        color: var(--text-secondary);
        font-size: 0.9rem;
        line-height: 1.5;
      }

      /* Checked item styling */
      li.checked .item-name {
        opacity: 0.7;
        text-decoration: line-through;
      }

      li.checked .item-desc {
        opacity: 0.7;
        text-decoration: line-through;
      }

      li.checked {
        border-radius: 8px;
        background: var(--checked-bg);
      }

      /* Error & Footer */
      #error-container {
        display: none;
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
        border-radius: 50px;
        background: #ef4444;
        padding: 12px 24px;
        color: white;
        font-weight: 600;
      }

      .footer-hint {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 14px;
        padding: 8px 20px 12px;
        color: var(--text-secondary);
        font-size: 0.78rem;
        text-align: center;
      }
      .reset-btn {
        appearance: none;
        transition: all 0.2s ease;
        cursor: pointer;
        border: 1.5px solid var(--text-secondary);
        border-radius: 100px;
        background: transparent;
        padding: 5px 14px;
        color: var(--text-secondary);
        font-weight: 600;
        font-size: 0.75rem;
        font-family: var(--font-main);
        white-space: nowrap;
      }
      .reset-btn:hover {
        box-shadow: 0 2px 10px rgba(239, 68, 68, 0.3);
        border-color: #ef4444;
        background: #ef4444;
        color: #fff;
      }
      .reset-btn:active {
        transform: scale(0.95);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          /* Night Mode Colors (Deep/Elegant) */
          --bg-body: #121212;
          --bg-gradient: linear-gradient(135deg, #121212 0%, #1e1e1e 100%);
          --card-bg: rgba(30, 30, 30, 0.7);
          --card-border: 1px solid rgba(235, 252, 186, 0.2);
          --text-primary: #e5e5e5;
          --text-secondary: #a0a0a0;
          --accent-color: #fbbf24;
          /* Turmeric Gold */
          --accent-glow: 0 0 25px rgba(251, 191, 36, 0.2);
          --badge-bg: rgba(74, 222, 128, 0.15);
          --badge-text: #4ade80;
          --check-color: #4ade80;
          --checked-bg: rgba(74, 222, 128, 0.08);
        }

        h1 {
          background: linear-gradient(to bottom, #fae1a3, #ac7f0d);
          -webkit-text-fill-color: none;
          -webkit-background-clip: text;
        }
      }

      /* Styles for mobile devices */
      @media (max-width: 767px) {
        li {
          padding: 10px 0;
        }
        .day-name {
          font-size: 1.3rem;
        }
      }
    </style>
  </head>

  <body>
    <div id="error-container"></div>

    <header>
      <h1 id="main-title">Snack a Day</h1>
      <p class="subtitle" id="current-date-display">Loading...</p>
    </header>

    <main class="carousel-container" id="cards-container" role="tablist">
      <!-- Cards injected via JS -->
    </main>

    <div class="footer-hint">
      <span>Swipe to explore · Check off snacks </span>
      <br /><span>Auto Resets in 4 weeks</span>
      <button class="reset-btn" id="resetBtn" title="Clear all checks">
        ↺ Reset All
      </button>
    </div>

    <script>
      const STORAGE_KEY = "snackChecks";
      const FOUR_WEEKS_MS = 28 * 24 * 60 * 60 * 1000;

      const snackData = [

            },
            {

        {

          items: [
            {
              name: "Roasted Cashews (Munthiri)",
              desc: "Pan-roasted with pepper(no salt).",
            },
            {

              desc: "Soaked and peeled for cooling effect.",

            {

              desc: "Instant iron & energy boost.",
            },
            { name: "Black Raisins", desc: "Soaked in water overnight" },
            { name: "Dry Figs", desc: "Chewy, calcium-rich snack." },
            { name: "Makhana (Thamarai Vidhai)", desc: "Lotus seeds roasted in a little ghee." },
            {
              name: "Pistachios (Pista)",
              desc: "Shelled and roasted; high in antioxidants and healthy fats for brain growth.",
            },
            {
              name: "Walnuts (Akroot)",
              desc: "Omega-3 rich for brain health; break into small bits to avoid choking.",
            },
            {
              name: "Dry Apricots (Ularndha Apricot)",
              desc: "Soft, chewy, and naturally sweet; excellent source of fiber and Vitamin A.",
            },
            {

              desc: "Immunity-boosting zinc; lightly pan-roast with a drop of ghee for a nutty taste.",
            },
          ],
        },
      ];

      // --- localStorage helpers ---

      function loadChecks() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return {};
          const data = JSON.parse(raw);
          const now = Date.now();
          let changed = false;
          // Purge expired entries
          for (const key of Object.keys(data)) {
            if (now - data[key] > FOUR_WEEKS_MS) {
              delete data[key];
              changed = true;
            }
          }
          if (changed) localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
          return data;
        } catch {
          return {};
        }
      }

      function saveCheck(id) {
        const data = loadChecks();
        data[id] = Date.now();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      }

      function removeCheck(id) {
        const data = loadChecks();
        delete data[id];
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      }

      // --- App Init ---

      document.addEventListener("DOMContentLoaded", () => {
        try {
          initApp();
        } catch (e) {
          showError("Init Error: " + e.message);
        }
      });

      function initApp() {
        const container = document.getElementById("cards-container");
        const dateDisplay = document.getElementById("current-date-display");

        // 1. Date Logic
        const now = new Date();
        dateDisplay.textContent = now.toLocaleDateString("en-IN", {
          weekday: "long",
          year: "numeric",
          month: "short",
          day: "numeric",
        });

        // 2. Calculate Active Day (Mon=0 ... Fri=4)
        let dayIndex = now.getDay();
        let activeIndex = dayIndex >= 1 && dayIndex <= 5 ? dayIndex - 1 : 0;

        const checks = loadChecks();

        snackData.forEach((data, dIdx) => {
          const card = document.createElement("article");
          card.className = "day-card";
          if (dIdx === activeIndex) card.classList.add("active");
          card.setAttribute("role", "tab");
          card.id = `card-${dIdx}`;

          const itemsHtml = data.items
            .map((item, iIdx) => {
              const checkId = `${dIdx}-${iIdx}`;
              const isChecked = checkId in checks;
              return `
  <li class="${isChecked ? "checked" : ""}">
    <label class="item-row">
      <input
        type="checkbox"
        class="snack-checkbox"
        data-id="${checkId}"
        ${isChecked ? "checked" : ""}
        aria-label="Mark ${escapeHtml(item.name)} as done"
      />
      <div class="item-content">
        <div class="item-name">${escapeHtml(item.name)}</div>
        <div class="item-desc">${escapeHtml(item.desc)}</div>
      </div>
    </label>
  </li>`;
            })
            .join("");

          card.innerHTML = `
            <div class="day-header">
              <span class="day-name">${data.day}</span>
              <span class="category-badge">${data.category}</span>
            </div>
            <div class="card-body">
              <ul>${itemsHtml}</ul>
            </div>`;

          // Delegate checkbox clicks
          card.addEventListener("change", (e) => {
            if (e.target.classList.contains("snack-checkbox")) {
              e.stopPropagation();
              const id = e.target.dataset.id;
              const li = e.target.closest("li");
              if (e.target.checked) {
                saveCheck(id);
                li.classList.add("checked");
              } else {
                removeCheck(id);
                li.classList.remove("checked");
              }
            }
          });

          // Prevent card click from toggling checkbox
          card.addEventListener("click", (e) => {
            if (e.target.classList.contains("snack-checkbox")) return;
            setActiveCard(dIdx);
            card.scrollIntoView({
              behavior: "smooth",
              block: "nearest",
              inline: "center",
            });
          });

          container.appendChild(card);
        });

        // 4. Initial Scroll to Active Card
        setTimeout(() => {
          const activeCard = document.getElementById(`card-${activeIndex}`);
          if (activeCard) {
            activeCard.scrollIntoView({
              behavior: "auto",
              block: "nearest",
              inline: "center",
            });
          }
        }, 100);

        document.getElementById("resetBtn").addEventListener("click", (e) => {
          e.stopPropagation();
          localStorage.removeItem(STORAGE_KEY);
          document.querySelectorAll(".snack-checkbox").forEach((cb) => {
            cb.checked = false;
            cb.closest("li").classList.remove("checked");
          });
        });
      }

      function setActiveCard(index) {
        const cards = document.querySelectorAll(".day-card");
        cards.forEach((c, i) => {
          if (i === index) c.classList.add("active");
          else c.classList.remove("active");
        });
      }

      function showError(msg) {
        const el = document.getElementById("error-container");
        el.style.display = "block";
        el.textContent = msg;
      }

      function escapeHtml(text) {
        return text.replace(/[&<>"']/g, function (m) {
          return {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#039;",
          }[m];
        });
      }
    </script>

</html>
